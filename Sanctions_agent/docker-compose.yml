services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ckyc
      POSTGRES_PASSWORD: ckyc
      POSTGRES_DB: ckyc
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckyc"]
      interval: 3s
      retries: 10

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://ckyc:ckyc@db:5432/ckyc
    ports: ["8000:8000"]
    volumes: [".:/app"]
    depends_on:
      db: {condition: service_healthy}

volumes:
  pgdata:
